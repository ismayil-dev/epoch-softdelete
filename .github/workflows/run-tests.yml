name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['7.3', '7.4', '8.0', '8.1', '8.2', '8.3']
        laravel-versions: ['^8.0', '^9.0', '^10.0', '^11.0']
        exclude:
          # Exclude Laravel 8 on PHP versions < 7.3 as it's already implied in the matrix
          - php-versions: '7.3'
            laravel-versions: '^9.0'
          - php-versions: '7.3'
            laravel-versions: '^10.0'
          - php-versions: '7.3'
            laravel-versions: '^11.0'
          - php-versions: '7.4'
            laravel-versions: '^9.0'
          - php-versions: '7.4'
            laravel-versions: '^10.0'
          - php-versions: '7.4'
            laravel-versions: '^11.0'
          - php-versions: '8.0'
            laravel-versions: '^10.0'
          - php-versions: '8.0'
            laravel-versions: '^11.0'
          - php-versions: '8.1'
            laravel-versions: '^11.0'
    steps:
      - uses: actions/checkout@v3
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite
          coverage: none
      - name: Install dependencies
        run: composer require "illuminate/database:${{ matrix.laravel-versions }}" --no-interaction --no-update --prefer-dist --no-progress --no-suggest
      - name: Execute tests
        run: vendor/bin/phpunit
