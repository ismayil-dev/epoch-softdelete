name: Code Style Check with Pint

on:
  push:
    branches: [ main ]
  pull_request:
    branches:
      - main
jobs:
  pint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: [ '8.0', '8.1', '8.2', '8.3' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: ./vendor/bin/pint

      - name: Fail if Pint finds issues
        if: failure()
        run: exit 1
